name: Multi-Platform Cloud Browser Automation

on:
  repository_dispatch:
    types: [n8n-trigger]

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Playwright & Linux GUI Dependencies
        run: |
          npm install
          npx playwright install chromium --with-deps
          sudo apt-get update
          sudo apt-get install -y xvfb x11vnc fluxbox websockify novnc

      - name: Inject Target Session Cookies
        env:
          FB_COOKIES: ${{ secrets.FACEBOOK_COOKIES }}
          IG_COOKIES: ${{ secrets.INSTAGRAM_COOKIES }}
          PIN_COOKIES: ${{ secrets.PINTEREST_COOKIES }}
          TT_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
        run: |
          echo "$FB_COOKIES" > facebook_cookies.json
          echo "$IG_COOKIES" > instagram_cookies.json
          echo "$PIN_COOKIES" > pinterest_cookies.json
          echo "$TT_COOKIES" > tiktok_cookies.json

      - name: Start Live GUI Stream Display
        run: |
          # 1. Start Virtual Display Screen
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          
          # 2. Start basic window frame manager
          fluxbox &
          sleep 1
          
          # 3. Start VNC Server to capture the screen
          x11vnc -display :99 -nopw -listen localhost -xkb &
          sleep 2
          
          # 4. Start web server to proxy VNC into your browser window
          /usr/share/novnc/utils/launch.sh --vnc localhost:5900 --listen 6080 &
          sleep 3

      - name: Setup Tmate Live Interactive Tunnel Session
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 15
        env:
          DISPLAY: :99

      - name: Execute Automation Script
        env:
          DISPLAY: :99
          PAYLOAD_DATA: ${{ toJson(github.event.client_payload) }}
        run: node upload-script.js

name: Cloud Browser Automation Workflow

on:
  repository_dispatch:
    types: [n8n-trigger]

jobs:
  run-browser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node Dependencies
        run: npm install

      - name: Install Playwright Chromium Core
        run: npx playwright install chromium --with-deps

      - name: Execute Automation Script
        env:
          # Yahan ham n8n se aane wale exact parameters script ko pass kar rahe hain
          TARGET_URL: ${{ github.event.client_payload.url }}
          PIN_TITLE: ${{ github.event.client_payload.pin_title }}
          PIN_DESCRIPTION: ${{ github.event.client_payload.pin_description }}
          PIN_LINK: ${{ github.event.client_payload.pin_link }}
          PIN_IMAGE: ${{ github.event.client_payload.pin_image }}
        run: node upload-script.js

name: Multi-Platform Cloud Browser Automation

on:
  repository_dispatch:
    types: [n8n-trigger]

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Playwright & Dependencies
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Inject Target Session Cookies
        env:
          FB_COOKIES: ${{ secrets.FACEBOOK_COOKIES }}
          IG_COOKIES: ${{ secrets.INSTAGRAM_COOKIES }}
          PIN_COOKIES: ${{ secrets.PINTEREST_COOKIES }}
          TT_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
        run: |
          echo "$FB_COOKIES" > facebook_cookies.json
          echo "$IG_COOKIES" > instagram_cookies.json
          echo "$PIN_COOKIES" > pinterest_cookies.json
          echo "$TT_COOKIES" > tiktok_cookies.json

      - name: Execute Automation Script
        env:
          PAYLOAD_DATA: ${{ toJson(github.event.client_payload) }}
        run: node upload-script.js

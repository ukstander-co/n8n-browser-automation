name: Multi-Platform Cloud Browser Automation

on:
  repository_dispatch:
    types: [n8n-trigger]

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Playwright & Linux GUI Dependencies
        run: |
          npm install
          npx playwright install chromium --with-deps
          sudo apt-get update
          sudo apt-get install -y xvfb x11vnc fluxbox websockify novnc
          # Localtunnel install kar rahe hain tmate ki jagah
          npm install -g localtunnel

      - name: Inject Target Session Cookies
        env:
          FB_COOKIES: ${{ secrets.FACEBOOK_COOKIES }}
          IG_COOKIES: ${{ secrets.INSTAGRAM_COOKIES }}
          PIN_COOKIES: ${{ secrets.PINTEREST_COOKIES }}
          TT_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
        run: |
          echo "$FB_COOKIES" > facebook_cookies.json
          echo "$IG_COOKIES" > instagram_cookies.json
          echo "$PIN_COOKIES" > pinterest_cookies.json
          echo "$TT_COOKIES" > tiktok_cookies.json

      - name: Start Live GUI Stream Display
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          fluxbox &
          sleep 1
          x11vnc -display :99 -nopw -listen localhost -xkb &
          sleep 2
          /usr/share/novnc/utils/launch.sh --vnc localhost:5900 --listen 6080 &
          sleep 3

      - name: Create Live Web Link for Browser GUI
        run: |
          echo "=========================================================="
          echo "OPEN THE LINK BELOW IN YOUR BROWSER TO WATCH LIVE:"
          # Port 6080 (noVNC) ko internet par share karega background me
          lt --port 6080 & 
          sleep 5
          echo "=========================================================="

      - name: Execute Automation Script
        env:
          DISPLAY: :99
          PAYLOAD_DATA: ${{ toJson(github.event.client_payload) }}
        run: node upload-script.js

      - name: Upload Debug Screenshots on Failure
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: automation-error-snapshots
          path: ./*_snapshot.png
